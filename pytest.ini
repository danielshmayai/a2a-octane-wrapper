[pytest]
# Test discovery and default options
testpaths = tests
python_files = test_*.py
addopts = -q
asyncio_mode = strict
timeout = 10
timeout_method = thread

# Notes:
# - Only collect unit tests from the tests/ directory.
# - test_a2a_auth_flow.py is an integration script that requires live servers
#   (A2A wrapper + Mock OAuth) and is not executed by default in unit runs.
# - E2E tests live in tests/e2e/ and can be run separately: `pytest tests/e2e/ -v`
